# fly.toml app configuration file generated for site-auditor on 2026-04-08T19:04:06-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# IMPORTANT (SQLite + local files):
# - Do not run more than one machine unless DATABASE_URL is Postgres (or another shared DB)
#   and artifacts are stored elsewhere. Each machine has its own disk → duplicate/missing
#   reports and 404s on executive.docx when the next request hits a different VM.
# - Create the volume in the SAME region as primary_region below, e.g.:
#     fly volumes create auditor_data --region ord --size 1
#   (If Fly says the name exists, `fly volumes list` — destroy the unused region’s volume
#   or pick a new mount name here and matching `fly volumes create my_name -r REGION`.)
# - Pin one machine:  fly scale count 1
# To skip the volume (ephemeral only), comment out [mounts] and the SITE_AUDITOR_DATA line.
#
# IAD (Ashburn) often hits "insufficient CPUs"; ORD (Chicago) is a typical fallback.

app = 'site-auditor'
primary_region = 'ord'

[build]

[env]
  SITE_AUDITOR_DATA = '/data/site_auditor'

[mounts]
  source = 'auditor_data'
  destination = '/data/site_auditor'

[http_service]
  internal_port = 8000
  force_https = true
  # Single-tenant: keep one machine up; avoid splitting traffic across DBs/disks.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Smaller VM sometimes schedules when a region is tight; bump to 1024 if audits OOM.
[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
