# fly.toml app configuration file generated for site-auditor on 2026-04-08T19:04:06-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# IMPORTANT (SQLite + local files):
# - Do not run more than one machine unless DATABASE_URL is Postgres (or another shared DB)
#   and artifacts are stored elsewhere. Each machine has its own disk → duplicate/missing
#   reports and 404s on executive.docx when the next request hits a different VM.
# - Create the volume in the SAME region as primary_region (iad):
#     fly volumes create auditor_data --region iad --size 1
#   (If Fly says the name exists, `fly volumes list` and resolve duplicates / rename mount.)
# - Pin one machine:  fly scale count 1
# To skip the volume (ephemeral only), comment out [mounts] and the SITE_AUDITOR_DATA line.
#
# If deploy fails with "insufficient CPUs" in iad, retry later or contact Fly; temporarily
# trying another region requires a volume in that region and primary_region changed to match.

app = 'site-auditor'
primary_region = 'iad'

[build]

[env]
  SITE_AUDITOR_DATA = '/data/site_auditor'

[mounts]
  source = 'auditor_data'
  destination = '/data/site_auditor'

[http_service]
  internal_port = 8000
  force_https = true
  # Single-tenant: keep one machine up; avoid splitting traffic across DBs/disks.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
